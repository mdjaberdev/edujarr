<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="src/output.css" rel="stylesheet" />
    <link rel="stylesheet" href="src/all.min.css" />
    <title>edujarr</title>
    <!-- Google fonts Start  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Rowdies:wght@300;400;700&family=Saira:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Google fonts End  -->
  </head>
  <body>
    <!-- Headerpart start  -->
    <header>
      <div class="container">
        <div class="flex-property justify-between py-3">
          <div class="">
            <img src="src/assets/logo.png" alt="logo.png" />
          </div>
          <div class="">
            <ul class="menu-ul">
              <li class="menu-li">
                <a href="#" class="menu-a"
                  >Home <i class="text-[#2AAA94] fa-solid fa-angle-down"></i
                ></a>
              </li>
              <li class="menu-li">
                <a href="#" class="menu-a"
                  >Courses <i class="text-[#2AAA94] fa-solid fa-angle-down"></i
                ></a>
              </li>
              <li class="menu-li">
                <a href="#" class="menu-a"
                  >Blog <i class="text-[#2AAA94] fa-solid fa-angle-down"></i
                ></a>
              </li>
              <li class="menu-li">
                <a href="#" class="menu-a"
                  >Shop <i class="text-[#2AAA94] fa-solid fa-angle-down"></i
                ></a>
              </li>
              <li class="menu-li">
                <a href="#" class="menu-a"
                  >Pages<i class="text-[#2AAA94] fa-solid fa-angle-down"></i
                ></a>
              </li>
              <li class="menu-li">
                <a href="#" class="menu-a"
                  >Events <i class="text-[#2AAA94] fa-solid fa-angle-down"></i
                ></a>
              </li>
            </ul>
          </div>
          <div class="flex-property gap-x-3 text-[#1c361b]">
            <img
              class="w-4.5 cursor-pointer"
              src="src/assets/shoppingIcon.png"
              alt="shoppingIcon.png"
            />
            <p><i class="cursor-pointer fa-regular fa-circle-user"></i></p>
            <p><i class="cursor-pointer fa-solid fa-magnifying-glass"></i></p>
          </div>
          <div class="flex-property gap-x-3">
            <button class="btn">Login</button>
            <button class="btn">Signup</button>
          </div>
        </div>
      </div>
    </header>
    <!-- Headerpart end  -->

    <!-- Bannerpart start  -->
    <div
      class="bg-[url('./assets/bannerBg.png')] py-60 bannerImgProperty -mt-20"
    >
      <div class="container">
        <div class="flex">
          <div class="">
            <h4 class="banner-h4">Successful coaches are visionaries</h4>
            <h1 class="banner-h1">
              Good <span class="text-[#2AAA94]">coaching</span> is good teaching
              & nothing else.
            </h1>
            <div class="flex-property gap-x-5 my-15">
              <button class="bannerBtn">View Courses</button>
              <button class="bannerBtn">Get Free Consultation</button>
            </div>
            <div
              class="w-115 p-1 bg-white flex-property justify-between rounded-md"
            >
              <input
                type="text"
                placeholder="What do you want to learn today?"
                class="pl-5 outline-0 w-70"
              />
              <div class="btn gap-x-2 flex-property">
                <i class="fa-solid fa-magnifying-glass"></i> Search
              </div>
            </div>
          </div>
          <div class="ml-5 mt-10">
            <h4 class="text-base text-white font-rowdies">Ronald Richards</h4>
            <p class="text-base text-white font-saira w-68">
              In a coaching role, you ask the questions and rely more on your
              staff, who become the experts, to provide the information.
            </p>
            <div class="flex-property gap-x-1 mt-4 text-[#5AB48E]">
              <p class="text-[12px] font-inter">4.9</p>
              <p class="text-[10px]"><i class="fa-solid fa-star"></i></p>
              <p class="text-[10px]"><i class="fa-solid fa-star"></i></p>
              <p class="text-[10px]"><i class="fa-solid fa-star"></i></p>
              <p class="text-[10px]"><i class="fa-solid fa-star"></i></p>
              <p class="text-[10px]"><i class="fa-solid fa-star"></i></p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Bannerpart end  -->

    <!-- BannerbottomPart start  -->
    <div
      class="bg-[url('./assets/bannerbotom.png')] py-10 bannerImgProperty -mt-36"
    ></div>
    <!-- BannerbottomPart end  -->
  </body>
</html>
